entity-protocol = { path = "core/protocol" }
entity-tree = { path = "core/tree" }
entity-peer = { path = "core/peer" }
entity-core = { path = "core/entity-core" }
entity-inbox = { path = "extensions/inbox" }
entity-continuation = { path = "extensions/continuation" }
entity-subscription = { path = "extensions/subscription" }
entity-clock = { path = "extensions/clock" }
entity-revision = { path = "extensions/revision" }
entity-query = { path = "extensions/query" }
entity-history = { path = "extensions/history" }
entity-compute = { path = "extensions/compute" }
entity-handler-ops = { path = "extensions/handler-ops" }
