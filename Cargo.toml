    "core/entity",
    "core/crypto",
    "core/store",
    "core/types",
    "core/capability",
    "core/wire",
    "core/handler",
    "core/protocol",
    "core/tree",
    "core/peer",
    "core/entity-core",
    "cmd/entity-peer",
    "cmd/wire-conformance",
    "extensions/inbox",
    "extensions/continuation",
    "extensions/subscription",
    "extensions/clock",
    "extensions/revision",
    "extensions/query",
    "extensions/history",
    "extensions/compute",
    "extensions/handler-ops",
    "extensions/capability",
    "extensions/identity",
    "extensions/attestation",
    "extensions/quorum",
    "extensions/role",
    "extensions/registry",
    "extensions/discovery",
    "extensions/relay",
    "extensions/route",
    "extensions/durability",
    "extensions/encryption",
    "extensions/conformance",
    "extensions/type-system",
    "extensions/content",
    "extensions/storage-substitute-sources",
    "extensions/storage-substitute-http",
    "extensions/local-files",
    "bindings/ffi",
    "bindings/godot",
    "bindings/sdk",
    "bindings/shell",
    # WASM-only proxy/host pair for browser-deployed peers. Each crate is
    # #![cfg(target_arch = "wasm32")] at root so native builds compile them
    # to an empty module. Intentionally NOT in default-members — explicit
    # `cargo check --target wasm32-unknown-unknown -p ...` lanes in CI
    # exercise them.
    "bindings/wasm-worker-protocol",
    "bindings/wasm-worker-host",
    "bindings/wasm-worker-proxy",
    "bindings/wasm-worker-example",
]

default-members = [
    "core/ecf",
    "core/hash",
    "core/entity",
    "core/crypto",
    "core/store",
    "core/types",
    "core/capability",
    "core/wire",
    "core/handler",
    "core/protocol",
    "core/tree",
    "core/peer",
    "core/entity-core",
    "cmd/entity-peer",
    "extensions/inbox",
    "extensions/continuation",
    "extensions/subscription",
    "extensions/clock",
    "extensions/revision",
    "extensions/query",
    "extensions/history",
    "extensions/compute",
    "extensions/handler-ops",
    "extensions/capability",
    "extensions/identity",
    "extensions/attestation",
    "extensions/quorum",
    "extensions/role",
    "extensions/registry",
    "extensions/discovery",
    "extensions/relay",
    "extensions/route",
    "extensions/encryption",
    "extensions/conformance",
    "extensions/type-system",
    "extensions/content",
    "extensions/storage-substitute-sources",
    "extensions/storage-substitute-http",
    "extensions/local-files",
]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/EntityChurch/entity-core-rust"

[workspace.dependencies]
# External
ciborium = "0.2"
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2 = "0.10"
rand = "0.8"
bs58 = "0.5"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.29"
async-trait = "0.1"
thiserror = "2"
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rusqlite = { version = "0.31", features = ["bundled"] }
directories = "5"
anyhow = "1"
web-time = "1.1"
unicode-normalization = "0.1"
# EXTENSION-ENCRYPTION v1.0 crypto stack (RustCrypto — pure Rust, WASM-clean).
# Scoped to extensions/encryption; intentionally NOT pulled into core/* so the
# core compile + WASM surface stays lean (judgment call: crypto primitives live
# in the extension, not core/crypto).
x25519-dalek = { version = "2", features = ["static_secrets"] }
# curve25519-dalek provides the Ed25519→X25519 birational map (EdwardsPoint::
# to_montgomery) used by the §16 R6 key-separation check. Already in-tree as a
# transitive dep of both dalek crates; pinned here for the direct use-site.
curve25519-dalek = "4"
chacha20poly1305 = "0.10"
argon2 = "0.5"
hkdf = "0.12"

# Internal crates
entity-ecf = { path = "core/ecf" }
entity-hash = { path = "core/hash" }
entity-entity = { path = "core/entity" }
entity-crypto = { path = "core/crypto" }
entity-store = { path = "core/store" }
entity-types = { path = "core/types" }
entity-capability = { path = "core/capability" }
entity-wire = { path = "core/wire" }
