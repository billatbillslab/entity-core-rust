entity-identity = { path = "extensions/identity" }
entity-attestation = { path = "extensions/attestation" }
entity-quorum = { path = "extensions/quorum" }
entity-role = { path = "extensions/role" }
entity-registry = { path = "extensions/registry" }
entity-discovery = { path = "extensions/discovery" }
entity-relay = { path = "extensions/relay" }
entity-route = { path = "extensions/route" }
