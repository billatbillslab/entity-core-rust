# Per-package optimization overrides for the dev profile.
#
# Crypto and CBOR libraries are heavily algorithmic and are pathologically
# slow when compiled at opt-level=0. They appear on every wire message
# (verify_request: 2× Ed25519 + multiple CBOR decodes per RPC), so debug
# builds without these overrides spend most of their time inside dalek's
# constant-time field arithmetic interpreting per-bit ladder steps as
# unoptimized stack frames. Build-time impact: small (these crates compile
# rarely). Runtime impact: ~100× faster verify_request in debug.
#
# Same code, just better-compiled — zero security impact.
[profile.dev.package.ed25519-dalek]
opt-level = 3
[profile.dev.package.curve25519-dalek]
opt-level = 3
# Ed448 (v7.67 Phase 2) is the same story as Ed25519, worse — its field/scalar
# arithmetic runs through the RustCrypto generic stack (ed448-goldilocks → ed448
# → elliptic-curve → crypto-bigint / fiat-crypto) plus SHAKE256, and verify is
# intrinsically ~10–15× heavier than Ed25519. Without these overrides a single
# Ed448 verify_request at opt-level=0 is slow enough that a request-heavy
# responder test (~650 EXECUTEs) blows past the cross-impl validator's per-test
# timeout — surfaced as a 2m18s rs-48 run that cascaded into 269
# spurious FAILs. Overrides apply per-package (not transitively), so optimize
# every heavy crate on the Ed448 path, not just the top-level signing crate.
[profile.dev.package.ed448-goldilocks]
opt-level = 3
[profile.dev.package.ed448]
opt-level = 3
[profile.dev.package.elliptic-curve]
opt-level = 3
[profile.dev.package.crypto-bigint]
opt-level = 3
[profile.dev.package.fiat-crypto]
opt-level = 3
[profile.dev.package.shake]
opt-level = 3
[profile.dev.package.sha2]
opt-level = 3
[profile.dev.package.ciborium]
opt-level = 3
[profile.dev.package.ciborium-io]
opt-level = 3
[profile.dev.package.ciborium-ll]
opt-level = 3
