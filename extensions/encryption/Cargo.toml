[package]
name = "entity-encryption"
version = "0.8.0"
edition.workspace = true
description = "Per-entity stateless encryption (EXTENSION-ENCRYPTION v1.0): self / peer / group modes"

[dependencies]
entity-ecf.workspace = true
entity-hash.workspace = true
thiserror.workspace = true
# EXTENSION-ENCRYPTION crypto stack (RustCrypto + dalek — pure Rust, WASM-clean).
x25519-dalek.workspace = true
curve25519-dalek.workspace = true
chacha20poly1305.workspace = true
argon2.workspace = true
hkdf.workspace = true
sha2.workspace = true
rand.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
ciborium.workspace = true
